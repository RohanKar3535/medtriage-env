name: medtriage_env
version: 1.0.0
description: "Emergency department triage environment where an AI agent acts as an ED nurse — assigning ESI priority levels, ordering diagnostic tests, managing bed allocation, consulting specialists, and handling patient deterioration across a simulated shift."
author: Rohan
type: api
license: mit
tasks:
  - name: single_triage
    difficulty: easy
    max_steps: 5
    score_range: [0.0, 0.95]
  - name: queue_ordering
    difficulty: medium
    max_steps: 15
    score_range: [0.0, 0.95]
  - name: er_shift
    difficulty: hard
    max_steps: 40
    score_range: [0.0, 0.95]
  - name: mass_casualty
    difficulty: hard
    max_steps: 50
    score_range: [0.0, 0.95]
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
validation:
  docker: true
  baseline: true
